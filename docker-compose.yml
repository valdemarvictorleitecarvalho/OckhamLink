services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

  redis:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
